	<p>The guard does not believe you, and he attacks you with his sword.</p>
	<p class="combat"><span class="enemy">Watchtower Guard</span><span class="combatskill">15</span><span class="endurance">22</span></p>
	<p>If you do not have a weapon, deduct 4 points from your <span class="attribute">COMBAT SKILL</span> for the duration of this combat.</p>
	<p id="sect65">You may evade the fight at any time by <a href="sect65.html">turning to 65</a>.</p>
	<p id="sect331">If you win the combat, <a href="sect331.html">turn to 331</a>.</p>
