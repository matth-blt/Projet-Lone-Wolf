	<p>&ldquo;The fare to Port Bax is 20 Gold Crowns,&rdquo; says the coachman in a gruff Ragadornian accent.</p>
	<p id="sect10">If you have 20 Gold Crowns and wish to purchase a ticket, <a href="sect10.html">turn to 10</a>.</p>
	<p id="sect238">If you do not have enough money for the fare, <a href="sect238.html">turn to 238</a>.</p>
