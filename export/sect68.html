	<p>The guard&apos;s expression changes to a sneer of contempt. &ldquo;I am a soldier of Durenor. Your gold will not help you here.&rdquo;</p>
	<p>Unfortunately you have insulted his honour and he intends to teach you a harsh lesson.</p>
